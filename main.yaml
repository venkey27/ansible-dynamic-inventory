- name: configure frontend server
  hosts: frontend
  become: yes
  serial: 2  #
  tasks:
  - name: ping # ping means, It is a quick test flight. You run a ping task at the very beginning of your playbook to make sure your connection, SSH keys, and passwords are correct before you try to do the heavy work like installing software.
    ping:  

  - name: install nginx
    package:
      name: nginx
      state: present