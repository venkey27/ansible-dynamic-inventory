plugin: amazon.aws.aws_ec2 # Instead of you manually typing static IP addresses into a text file (like an hosts inventory file file), this plugin tells Ansible to automatically talk to AWS and grab a live, real-time list of your EC2 instances.

regions:
- us-east-1

hostnames:
  # this option allows displaying the public ip address
  - private-ip-address

filters:
  # this selects only running instances with tag ' Environment' tag set to 'dev'
  tag:Name: frontend
  instance-state-name: running  

keyed_groups:
  - key: ec2_tags.name
    separator: ''

